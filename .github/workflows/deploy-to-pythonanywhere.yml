name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Deploy to PythonAnywhere
      run: |
        # Pull code and restart web app via console
        curl -X POST "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/consoles/${{ secrets.PA_USERNAME }}.pythonanywhere.com/" \
        -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
        -H "Content-Type: application/json" \
        -d '{"input": "cd ~/stats && git pull && touch /var/www/idynkydnk_pythonanywhere_com_wsgi.py\n"}'
        
    - name: Notify deployment success
      if: success()
      run: echo "✅ Successfully deployed to PythonAnywhere!"
      
    - name: Notify deployment failure
      if: failure()
      run: echo "❌ Deployment failed. Check the logs above."
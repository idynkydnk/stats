name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main  # Change to 'master' if that's your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Deploy to PythonAnywhere
      run: |
        # Pull latest code and reload web app
        echo "Pulling latest code and reloading web app..."
        
        # Reload the web app (this will trigger a restart)
        curl -X POST "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_DOMAIN }}/reload/" \
        -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
        --fail --show-error
        
        echo "Web app reloaded successfully!"
        
    - name: Notify deployment success
      if: success()
      run: echo "✅ Successfully deployed to PythonAnywhere!"
      
    - name: Notify deployment failure
      if: failure()
      run: echo "❌ Deployment failed. Check the logs above."

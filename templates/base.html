<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <meta name="viewport" content="width=device-width" />
</head>
<body>
    <nav>
        <h1><a href="{{ url_for('index') }}">Doubles</a> <a href="{{ url_for('vollis') }}">Vollis</a></h1>
        <div class="menu-container">
            <button class="menu-toggle" id="menu-toggle">☰</button>
            <div class="menu-overlay" id="menu-overlay"></div>
            <div class="menu-sidebar" id="menu-sidebar">
                <button class="menu-close" id="menu-close">×</button>
                <ul class="menu-list">
                    <li><a href="{{ url_for('games') }}">Games</a></li>
                    <li><a href="{{ url_for('vollis_games') }}">Vollis Games</a></li>
                    <li><a href="{{ url_for('top_teams') }}">Top Teams</a></li>
                    <li><a href="{{ url_for('advanced_stats') }}">Advanced Stats</a></li>
                    <li><a href="{{ url_for('one_v_one') }}">1v1 Stats</a></li>
                    <li><a href="{{ url_for('one_v_one_games') }}">1v1 Games</a></li>
                    <li><a href="{{ url_for('other') }}">Other Stats</a></li>
                    <li><a href="{{ url_for('other_games') }}">Other Games</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="content">
        {% for message in get_flashed_messages() %}
            <div class="alert">{{ message }}</div>
        {% endfor %}
        {% block content %} {% endblock %}
    </div>

    <script>
        // Simple hamburger menu functionality
        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const menuOverlay = document.getElementById('menu-overlay');
        const menuSidebar = document.getElementById('menu-sidebar');

        function openMenu() {
            menuOverlay.classList.add('active');
            menuSidebar.classList.add('active');
            menuToggle.classList.add('active');
            menuToggle.textContent = '×';
        }

        function closeMenu() {
            menuOverlay.classList.remove('active');
            menuSidebar.classList.remove('active');
            menuToggle.classList.remove('active');
            menuToggle.textContent = '☰';
        }

        // Toggle menu when clicking hamburger button (opens if closed, closes if open)
        menuToggle.addEventListener('click', function() {
            if (menuToggle.classList.contains('active')) {
                closeMenu();
            } else {
                openMenu();
            }
        });

        // Close menu when clicking X button inside sidebar
        menuClose.addEventListener('click', closeMenu);

        // Close menu when clicking overlay (outside the sidebar)
        menuOverlay.addEventListener('click', closeMenu);

        // Close menu when clicking on menu links
        document.querySelectorAll('.menu-list a').forEach(link => {
            link.addEventListener('click', closeMenu);
        });
    </script>
</body>
</html>
